version: "3.8"

services:
  web:
    container_name: smarthire-web
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/ui/node_modules
      - /app/packages/utils/node_modules
      - /app/packages/logger/node_modules
      - /app/packages/types/node_modules
      - /app/packages/config/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WATCHPACK_POLLING=true # Ensure hot-reloading works inside Docker on Windows/Mac
    env_file:
      - apps/web/.env.example
